<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A+ Study Hub — 220-1201 / 220-1202</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='%23f4f4f5'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='%230a0a0c'/><rect x='1' y='1' width='62' height='62' rx='13' fill='none' stroke='%23333338' stroke-width='2'/><text x='32' y='43' font-family='Arial' font-size='30' font-weight='800' text-anchor='middle' fill='url(%23g)'>A+</text></svg>">
<style>
  :root{
    --bg:#050506; --card:rgba(255,255,255,.035); --card2:rgba(255,255,255,.065); --border:rgba(255,255,255,.09);
    --text:#ececee; --muted:#9a9aa3; --accent:#e4e4e7; --accent2:#a1a1aa; --accent-ink:#121216;
    --glow:rgba(255,255,255,.18);
    --good:#3ddc84; --warn:#ffb84d; --bad:#ff5d6c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh}
  .wrap{max-width:960px;margin-left:240px;margin-right:auto;padding:16px 24px 80px;transition:margin .25s}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px}
  header h1{font-size:1.35rem;font-weight:700}
  header h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:.8rem}
  /* ---- collapsible sidebar ---- */
  #sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;z-index:30;display:flex;flex-direction:column;
    padding:16px 12px;background:var(--card);border-right:1px solid var(--border);
    backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);
    transition:width .25s,transform .25s}
  .sb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:4px 6px}
  .sb-brand{font-weight:800;font-size:1.05rem;white-space:nowrap;overflow:hidden}
  .sb-collapse{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:8px;
    width:28px;height:28px;cursor:pointer;flex-shrink:0;transition:.15s}
  .sb-collapse:hover{color:var(--text)}
  #nav{display:flex;flex-direction:column;gap:6px}
  #nav button{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:transparent;color:var(--muted);border:1px solid transparent;border-radius:12px;
    padding:11px 12px;cursor:pointer;font-size:.88rem;font-weight:600;transition:.18s;white-space:nowrap;overflow:hidden}
  #nav button:hover{color:var(--text);background:var(--card2)}
  #nav button.active{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:0 0 18px var(--glow)}
  #nav .ico{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0}
  body.sb-min #sidebar{width:64px}
  body.sb-min .lbl{display:none}
  body.sb-min .sb-top{flex-direction:column;gap:10px;justify-content:center}
  body.sb-min .wrap{margin-left:84px}
  .sb-burger{display:none}
  @media(max-width:760px){
    #sidebar{transform:translateX(-105%);width:230px}
    body.sb-open #sidebar{transform:none}
    body.sb-min #sidebar{width:230px}
    body.sb-min .lbl{display:inline}
    .wrap{margin-left:0!important;padding:16px 14px 80px}
    .sb-burger{display:inline-block}
  }
  .card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;
    backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
    box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.09);
    animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  .card h2{font-size:1.05rem;margin-bottom:12px}
  .card h3{font-size:.95rem;margin-bottom:8px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .bar-row{margin-bottom:12px}
  .bar-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px}
  .bar-label .pct{color:var(--muted)}
  .bar{height:8px;background:rgba(10,15,26,.5);border-radius:5px;overflow:hidden}
  .bar>div{height:100%;border-radius:5px;transition:width .4s}
  .btn{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border:none;border-radius:12px;padding:12px 20px;
    font-size:.95rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s,filter .15s}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 20px var(--glow)}
  .btn::after{content:"";position:absolute;top:0;left:-75%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg)}
  .btn:hover::after{left:125%;transition:left .55s ease}
  .btn.secondary{background:var(--card2);border:1px solid var(--border);color:var(--text);
    backdrop-filter:blur(12px) saturate(1.5);-webkit-backdrop-filter:blur(12px) saturate(1.5)}
  .btn.small{padding:8px 14px;font-size:.83rem}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:14px;
    padding:3px 10px;font-size:.72rem;color:var(--muted);margin-right:6px}
  .gap-item{display:flex;justify-content:space-between;align-items:center;background:var(--card2);
    border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:.87rem}
  .gap-item .score{font-weight:700}
  .focus-item{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);
    border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;user-select:none}
  .focus-item:hover{border-color:var(--accent)}
  .focus-item.on{border-color:var(--accent);background:#1d2c48}
  .focus-item .check{width:20px;height:20px;border-radius:6px;border:2px solid var(--muted);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--accent-ink)}
  .focus-item.on .check{background:var(--accent);border-color:var(--accent)}
  .focus-item .meta{font-size:.75rem;color:var(--muted)}
  .qnum{color:var(--muted);font-size:.8rem;margin-bottom:8px}
  .question{font-size:1.02rem;line-height:1.5;margin-bottom:16px;font-weight:600}
  .opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--border);
    color:var(--text);border-radius:10px;padding:13px 15px;margin-bottom:9px;cursor:pointer;
    font-size:.92rem;line-height:1.4;transition:.15s}
  .opt:hover:not(:disabled){border-color:var(--accent)}
  .opt.correct{border-color:var(--good);background:rgba(61,220,132,.12)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,93,108,.12)}
  .opt:disabled{cursor:default}
  .explain{background:rgba(10,15,26,.5);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;
    padding:12px 15px;font-size:.87rem;line-height:1.55;color:#c4cdda;margin:10px 0 14px}
  .result-big{font-size:2.6rem;font-weight:800;text-align:center;margin:10px 0}
  .center{text-align:center}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .muted{color:var(--muted);font-size:.85rem;line-height:1.5}
  .stat-line{display:flex;justify-content:space-between;font-size:.87rem;padding:7px 0;border-bottom:1px solid var(--border)}
  .stat-line:last-child{border-bottom:none}
  .tag{font-size:.7rem;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:8px}
  .tag.c1{background:rgba(79,142,247,.2);color:var(--accent)}
  .tag.c2{background:rgba(124,92,252,.2);color:var(--accent2)}
  ul.plain{list-style:none}
  ul.plain li{padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem;line-height:1.5}
  ul.plain li:last-child{border-bottom:none}
  ul.plain li b{color:var(--accent)}
  .danger{color:var(--bad)}
  /* ---- modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;max-width:440px;width:92%}
  .modal input,.modal select{width:100%;background:rgba(10,15,26,.5);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:10px 12px;font-size:.9rem;margin:6px 0 12px}
  /* ---- chat ---- */
  .chat-box{background:rgba(10,15,26,.5);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:420px;overflow-y:auto;margin-bottom:10px}
  .msg{max-width:88%;border-radius:12px;padding:10px 13px;margin-bottom:8px;font-size:.88rem;line-height:1.55;white-space:pre-wrap}
  .msg.user{background:var(--accent);color:var(--accent-ink);margin-left:auto}
  .msg.ai{background:var(--card2);border:1px solid var(--border)}
  .msg.think{color:var(--muted);font-style:italic;background:none;border:none}
  .chat-input{display:flex;gap:8px}
  .chat-input input{flex:1;background:rgba(10,15,26,.5);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:.9rem}
  /* ---- labs hub ---- */
  .lab-tile{display:flex;gap:14px;align-items:center;background:var(--card2);border:1px solid var(--border);
    border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .lab-tile:hover{border-color:var(--accent);transform:translateY(-1px)}
  .lab-tile .ico{font-size:1.7rem}
  .lab-tile .meta{font-size:.78rem;color:var(--muted);margin-top:2px}
  /* ---- pbq ---- */
  .pbq-slot{display:flex;align-items:center;gap:10px;background:rgba(10,15,26,.5);border:1px dashed var(--border);
    border-radius:9px;padding:10px 13px;margin-bottom:7px;min-height:42px;font-size:.88rem;cursor:pointer}
  .pbq-slot.filled{border-style:solid;background:var(--card2)}
  .pbq-slot.ok{border-color:var(--good)} .pbq-slot.bad{border-color:var(--bad)}
  .pbq-slot .n{color:var(--muted);font-weight:700;width:20px}
  .pbq-pool{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .pbq-chip{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 13px;
    font-size:.86rem;cursor:pointer;transition:.12s;user-select:none}
  .pbq-chip:hover{border-color:var(--accent)}
  .wire{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:7px;border:1px solid #0008}
  /* ---- terminal ---- */
  .term{background:#0a0e14;border:1px solid var(--border);border-radius:10px;padding:14px;
    font-family:'Cascadia Mono','Consolas',monospace;font-size:.82rem;line-height:1.5;height:380px;overflow-y:auto;color:#c9d4e3}
  .term .cmd{color:#7ee787}.term .err{color:var(--bad)}.term .ok{color:var(--good)}.term .sys{color:var(--warn)}
  .term-input{display:flex;gap:0;margin-top:8px;background:#0a0e14;border:1px solid var(--border);border-radius:10px;padding:8px 12px;
    font-family:'Cascadia Mono','Consolas',monospace}
  .term-input span{color:#7ee787;font-size:.85rem;padding-top:2px}
  .term-input input{flex:1;background:none;border:none;outline:none;color:#e8ecf4;font-family:inherit;font-size:.85rem;padding-left:8px}
  /* ---- pc builder ---- */
  .mobo{position:relative;background:linear-gradient(145deg,#14331d,#0d2414);border:2px solid #2c5238;border-radius:12px;
    height:430px;margin-bottom:12px;overflow:hidden}
  .zone{position:absolute;border:2px dashed #4a7a5a;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:.68rem;color:#9fc9ac;text-align:center;padding:4px;transition:.15s;cursor:pointer}
  .zone.hot{border-color:var(--warn);background:rgba(255,184,77,.12)}
  .zone.done{border-style:solid;border-color:var(--good);background:rgba(61,220,132,.15);color:var(--good);font-weight:700}
  .parts{display:flex;flex-wrap:wrap;gap:8px}
  .part{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 13px;font-size:.85rem;cursor:grab;user-select:none}
  .part.sel{border-color:var(--warn);background:rgba(255,184,77,.12)}
  .part.used{opacity:.35;pointer-events:none}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .shake{animation:shake .25s 2}
  /* ---- 3d lab ---- */
  #c3d{width:100%;height:340px;border-radius:10px;background:radial-gradient(circle at 50% 40%,#1c2536,#0c111c);touch-action:none;cursor:grab}
  .conn-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .conn-chips button{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:16px;
    padding:6px 13px;font-size:.8rem;cursor:pointer;font-weight:600}
  .conn-chips button.active{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .spec-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:.85rem}
  .spec-grid dt{color:var(--muted)}.spec-grid dd{margin:0}
  /* ---- settings ---- */
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:14px;
    padding:6px 13px;font-size:.8rem;cursor:pointer;font-weight:600}
  .seg button.active{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .set-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    padding:12px 0;border-bottom:1px solid var(--border)}
  .set-row:last-child{border-bottom:none}
  .inp{background:rgba(10,15,26,.5);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:.88rem}
  .opt.sel{border-color:var(--accent)}
  /* ---- light theme ---- */
  body.light{--bg:#e6ecf6;--card:rgba(255,255,255,.6);--card2:rgba(255,255,255,.55);--border:rgba(30,45,80,.16);--text:#1d2536;--muted:#67718a;
    --accent:#4f8ef7;--accent2:#7c5cfc;--accent-ink:#fff;--glow:rgba(79,142,247,.4)}
  body.light .bar{background:#e2e8f2}
  body.light .explain{background:#f2f5fb;color:#3a4356}
  body.light .chat-box{background:#f7f9fc}
  body.light .inp,body.light .chat-input input,body.light .modal input,body.light .modal select{background:#fff}
  body.light .pbq-slot{background:#f7f9fc}
  body.light #c3d{background:radial-gradient(circle at 50% 40%,#dfe7f3,#c2cfe3)}
  /* ---- liquid glass: blobs & motion ---- */
  .bg-blobs{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;animation:drift 20s ease-in-out infinite alternate}
  .b1{width:46vw;height:46vw;background:#232327;top:-12%;left:-12%}
  .b2{width:40vw;height:40vw;background:#3c2874;bottom:-18%;right:-10%;opacity:.3;animation-duration:26s;animation-delay:-8s}
  .b3{width:30vw;height:30vw;background:#1b1b1f;top:42%;left:56%;animation-duration:32s;animation-delay:-15s}
  body.light .blob{opacity:.4}
  body.light .b1{background:#9dbcf5}
  body.light .b2{background:#c4b2f7}
  body.light .b3{background:#9ad3f2}
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(7vw,-5vh) scale(1.18)}}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  #app>.card:nth-child(2){animation-delay:.07s}
  #app>.card:nth-child(3){animation-delay:.14s}
  #app>.card:nth-child(4){animation-delay:.21s}
  #app>.card:nth-child(5){animation-delay:.28s}
  .grid2 .card{animation-delay:.14s}
  .result-big{animation:pop .5s cubic-bezier(.2,.7,.3,1) both}
  .overlay{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .lab-tile,.focus-item,.pbq-chip,.part{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .lab-tile:hover{box-shadow:0 8px 24px var(--glow)}
  .opt{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .opt:hover:not(:disabled){transform:translateY(-1px)}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  /* ---- reference-inspired refinements (Fleek / Fey / Quadrata) ---- */
  .card{border-radius:20px;box-shadow:0 12px 44px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06)}
  header h1{letter-spacing:-.02em;font-weight:800}
  .card h2{letter-spacing:-.01em;font-weight:700}
  .sub,.qnum{text-transform:uppercase;letter-spacing:.14em;font-size:.66rem;
    font-family:'Cascadia Mono','Consolas',monospace;color:var(--muted)}
  .pill,.tag{text-transform:uppercase;letter-spacing:.09em;font-size:.62rem;font-weight:700;
    font-family:'Cascadia Mono','Consolas',monospace;border-radius:999px}
  .btn{border-radius:999px;text-transform:uppercase;letter-spacing:.09em;font-size:.78rem;font-weight:700;padding:13px 24px}
  .btn.small{padding:9px 16px;font-size:.68rem}
  .btn.secondary{background:transparent;border:1px solid var(--border)}
  .btn.secondary:hover{border-color:var(--text);box-shadow:none}
  .seg button,.conn-chips button{border-radius:999px}
  .lab-tile,.focus-item{border-radius:16px}
  .bar{height:6px}
  #nav button{border-radius:999px}
  .result-big{font-weight:800;letter-spacing:-.03em}
  .sb-brand{letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
  /* ---- logo badge ---- */
  .logo-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;
    background:linear-gradient(150deg,#1d1d24,#0b0b0e);border:1px solid var(--border);flex-shrink:0;
    animation:logoGlow 3.5s ease-in-out infinite}
  .logo-badge.sm{width:26px;height:26px;border-radius:8px}
  .logo-txt{font-weight:800;font-size:.78rem;letter-spacing:-.02em;
    background:linear-gradient(120deg,#f4f4f5 20%,#8b5cf6 50%,#f4f4f5 80%);background-size:220% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:sheenText 4s linear infinite}
  .logo-badge.sm .logo-txt{font-size:.64rem}
  @keyframes sheenText{to{background-position:220% center}}
  @keyframes logoGlow{50%{box-shadow:0 0 16px rgba(139,92,246,.35)}}
  /* ---- animated nav icons ---- */
  #nav .ico{display:flex;align-items:center;justify-content:center}
  #nav .ico svg{width:19px;height:19px;transition:transform .25s}
  #nav svg *{transform-box:fill-box;transform-origin:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes eq{50%{transform:scaleY(.5)}}
  @keyframes bubble{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-7px);opacity:0}}
  @keyframes twinkle{50%{opacity:.15;transform:scale(.6)}}
  @keyframes ringPing{70%{transform:scale(1.14);opacity:.35}100%{transform:scale(1.2);opacity:0}}
  #nav button:hover .ic-set{transform:rotate(70deg)}
  #nav button.active .ic-set{animation:spin 7s linear infinite}
  #nav button:hover .ic-quiz{transform:rotate(-10deg) translateY(-1px)}
  #nav button:hover .ic-grow{transform:translate(1px,-2px)}
  #nav button:hover .ic-labs{transform:rotate(-7deg)}
  #nav button.active .ic-labs .bub{animation:bubble 1.5s ease-in infinite}
  #nav button.active .ic-dash rect{transform-origin:center 90%;animation:eq 1.5s ease-in-out infinite}
  #nav button.active .ic-dash rect:nth-of-type(2){animation-delay:.2s}
  #nav button.active .ic-dash rect:nth-of-type(3){animation-delay:.4s}
  #nav button.active .ic-ai .spk{animation:twinkle 1.4s ease-in-out infinite}
  #nav button:hover .ic-focus .ring,#nav button.active .ic-focus .ring{animation:ringPing 1.3s ease-out infinite}
  /* ---- inline UI icons ---- */
  .ui-ic{width:1.05em;height:1.05em;vertical-align:-.15em;display:inline-block}
  .card h2 .ui-ic{margin-right:8px;opacity:.9}
  .lab-tile .ico .ui-ic{width:24px;height:24px;color:var(--muted)}
  .lab-tile:hover .ico .ui-ic{color:var(--text)}
  .seg .ui-ic{width:.95em;height:.95em;margin-right:4px}
  .part .ui-ic{margin-right:5px;color:var(--muted)}
  /* ---- liquid glass v2: prismatic rings & knobs (iOS-glass style) ---- */
  @keyframes irisSpin{to{transform:rotate(360deg)}}

  body.sb-min #sidebar{width:76px;padding:16px 12px;align-items:center}
  body.sb-min .wrap{margin-left:96px}
  body.sb-min .sb-top{flex-direction:column;gap:12px;margin-bottom:18px;width:100%}
  body.sb-min .logo-badge{width:40px;height:40px;border-radius:12px}
  body.sb-min .logo-badge .logo-txt{font-size:.9rem}
  body.sb-min #nav{gap:10px;width:100%;align-items:center}
  body.sb-min #nav button{width:52px;height:52px;padding:0;justify-content:center;border-radius:50%}
  body.sb-min #nav .ico{width:100%;height:100%;background:transparent;box-shadow:none}
  body.sb-min #nav .ico svg{width:19px;height:19px}
  body.sb-min #nav button.active .ico{background:transparent}
  .sb-collapse{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px}
  .sb-collapse svg{width:15px;height:15px;transition:transform .25s}
  /* use the empty space: centre content in the area beside the sidebar */
  .wrap{max-width:none;padding:16px 34px 90px}
  header,#app{max-width:1080px;margin-left:auto;margin-right:auto}
  /* softer card corners + single clean edge */
  .card{border-color:rgba(255,255,255,.11);
    box-shadow:0 18px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.09)}
  .card::after{inset:1px;
    background:radial-gradient(80% 70% at 10% -10%,rgba(167,139,250,.13),transparent 70%),
               radial-gradient(70% 65% at 96% 110%,rgba(125,211,206,.11),transparent 72%);
    opacity:.85}
  .card:hover{box-shadow:0 22px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.13)}
  /* cursor-reactive background */
  .cursor-glow{position:absolute;width:46vmax;height:46vmax;left:0;top:0;margin:-23vmax 0 0 -23vmax;
    border-radius:50%;pointer-events:none;opacity:.5;filter:blur(70px);
    background:radial-gradient(circle,rgba(167,139,250,.40),rgba(125,211,206,.16) 45%,transparent 70%);
    transform:translate3d(50vw,50vh,0)}
  body.light .cursor-glow{opacity:.3}
  .blob,.cursor-glow{will-change:transform}
  @media (prefers-reduced-motion:reduce){.cursor-glow{display:none}}
</style>
</head>
<body>

</aside>

  <span class="ico"></span><span class="lbl">AI Tutor</span>
</button>

<div class="wrap">
  <header>

      <button class="btn small secondary sb-burger" onclick="sbOpen=!sbOpen;render()">☰</button>
      <div>
        <h1 style="display:flex;align-items:center;gap:10px"><span class="logo-badge sm"><span class="logo-txt">A+</span></span>Study Hub</h1>
        <div class="sub">CompTIA A+ · Core 1 (220-1201) &amp; Core 2 (220-1202)</div>
      </div>
    </div>
  </header>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ================= DOMAINS ================= */
const DOMAINS = [
  {id:"mobile",  core:1, name:"Mobile Devices",                    weight:15},
  {id:"net",     core:1, name:"Networking",                        weight:20},
  {id:"hw",      core:1, name:"Hardware",                          weight:25},
  {id:"cloud",   core:1, name:"Virtualization & Cloud",            weight:11},
  {id:"hwts",    core:1, name:"HW & Network Troubleshooting",      weight:29},
  {id:"os",      core:2, name:"Operating Systems",                 weight:30},
  {id:"sec",     core:2, name:"Security",                          weight:27},
  {id:"swts",    core:2, name:"Software Troubleshooting",          weight:26},
  {id:"ops",     core:2, name:"Operational Procedures",            weight:17},
];

/* ================= QUESTION BANK =================
   q: question, o: options, a: index of correct, e: explanation */
const QUESTIONS = [
/* ---- Mobile Devices (Core 1, 15%) ---- */
{d:"mobile",q:"What type of RAM module is used in most laptops?",o:["DIMM","SO-DIMM","ECC RDIMM","SIMM"],a:1,e:"Laptops use SO-DIMM (Small Outline DIMM) — a physically smaller module than the full-size DIMMs in desktops."},
{d:"mobile",q:"A user wants email on their phone to stay synchronized with the server so messages read on the phone show as read everywhere. Which protocol should be used?",o:["POP3","SMTP","IMAP","FTP"],a:2,e:"IMAP keeps mail on the server and syncs state across devices. POP3 downloads (and typically deletes) mail locally. SMTP only sends mail."},
{d:"mobile",q:"Which technology lets a company enforce passcodes, push apps, and remotely wipe employee smartphones?",o:["VPN","MDM","NFC","DRM"],a:1,e:"Mobile Device Management (MDM) is the enterprise tool for enforcing policy, deploying apps, and remote-wiping managed devices."},
{d:"mobile",q:"A phone's screen displays correctly but doesn't respond to touch. Which component has most likely failed?",o:["The LCD panel","The digitizer","The GPU","The inverter"],a:1,e:"The digitizer is the touch-sensing layer. If the image is fine but touch fails, the digitizer is the likely culprit; a broken LCD would show display artifacts."},
{d:"mobile",q:"Which feature allows a modern smartphone to activate cellular service without a physical SIM card?",o:["NFC","eSIM","IMEI","MicroSD"],a:1,e:"An eSIM is an embedded, reprogrammable SIM. Carriers provision it digitally — no physical card needed. New on the 220-1201."},
{d:"mobile",q:"Which wireless technology is used for tap-to-pay transactions?",o:["Bluetooth","NFC","Wi-Fi Direct","IR"],a:1,e:"NFC (Near Field Communication) works over a few centimeters and powers contactless payment like Apple Pay and Google Wallet."},
{d:"mobile",q:"A user needs internet on their laptop while traveling and only has their smartphone. What feature should they use?",o:["Airplane mode","Bluetooth pairing","Hotspot/tethering","NFC beam"],a:2,e:"A mobile hotspot (tethering) shares the phone's cellular data connection with other devices over Wi-Fi, USB, or Bluetooth."},
{d:"mobile",q:"Which laptop display technology offers the best contrast and true blacks by lighting each pixel individually?",o:["TN","IPS","OLED","CCFL"],a:2,e:"OLED pixels emit their own light and can turn fully off, giving perfect blacks. IPS offers good color/viewing angles but uses a backlight; TN is fastest but worst colors."},
{d:"mobile",q:"A company phone is lost. What should be done FIRST to protect corporate data?",o:["Change the Wi-Fi password","Issue a remote wipe","Call the carrier for a new SIM","File a police report"],a:1,e:"Remote wipe (via MDM or find-my-device) immediately protects the data. Everything else can follow."},
{d:"mobile",q:"Which connector is standard for charging and data on modern Android phones and newer iPhones?",o:["Lightning","Micro-USB","USB-C","Mini-USB"],a:2,e:"USB-C is now the universal standard — the EU mandate moved iPhone from Lightning to USB-C as well."},

/* ---- Networking (Core 1, 20%) ---- */
{d:"net",q:"Which port does HTTPS use?",o:["80","110","443","3389"],a:2,e:"HTTPS uses TCP 443. HTTP is 80, POP3 is 110, RDP is 3389. Port numbers are heavily tested — memorize the table."},
{d:"net",q:"Which port is used by SSH?",o:["21","22","23","25"],a:1,e:"SSH uses TCP 22. FTP is 20/21, Telnet is 23 (insecure), SMTP is 25."},
{d:"net",q:"A workstation shows an IP address of 169.254.10.15. What does this indicate?",o:["A static IP was assigned","DHCP failed — APIPA address","The DNS server is down","The subnet mask is wrong"],a:1,e:"169.254.x.x is APIPA — Windows self-assigns it when no DHCP server responds. Classic exam question."},
{d:"net",q:"Which service translates domain names like google.com into IP addresses?",o:["DHCP","DNS","NAT","SNMP"],a:1,e:"DNS resolves names to IPs (port 53). DHCP assigns addresses; NAT translates private↔public addresses."},
{d:"net",q:"Which 802.11 standard is marketed as Wi-Fi 6?",o:["802.11n","802.11ac","802.11ax","802.11g"],a:2,e:"802.11ax = Wi-Fi 6 (and 6E on the 6 GHz band). 802.11ac = Wi-Fi 5, 802.11n = Wi-Fi 4."},
{d:"net",q:"Which wireless encryption standard is currently the most secure?",o:["WEP","WPA","WPA2","WPA3"],a:3,e:"WPA3 is the latest and strongest, adding SAE handshakes. WEP and WPA are broken; WPA2 is the widespread minimum."},
{d:"net",q:"Which cable category supports 10 Gbps up to 100 meters?",o:["Cat5","Cat5e","Cat6","Cat6a"],a:3,e:"Cat6a handles 10GBASE-T at the full 100 m. Cat6 does 10 Gbps only to ~55 m; Cat5e tops out at 1 Gbps."},
{d:"net",q:"Which fiber type is used for long-distance runs, using a laser light source?",o:["Multimode (MMF)","Single-mode (SMF)","Coaxial","Twinaxial"],a:1,e:"Single-mode fiber has a tiny core and laser source for long distances (kilometers). Multimode uses LEDs for shorter, cheaper runs."},
{d:"net",q:"Which device connects multiple devices on a LAN and forwards frames based on MAC addresses?",o:["Hub","Router","Switch","Modem"],a:2,e:"A switch learns MAC addresses and forwards intelligently. A hub blindly repeats to all ports; a router forwards between networks using IP addresses."},
{d:"net",q:"What technology lets many devices on a private network share one public IP address?",o:["DHCP","DNS","NAT","VLAN"],a:2,e:"Network Address Translation (NAT) maps private internal addresses to a public one at the router — how home networks reach the internet."},
{d:"net",q:"Which port does RDP (Remote Desktop Protocol) use?",o:["22","53","143","3389"],a:3,e:"RDP uses TCP 3389. SSH 22, DNS 53, IMAP 143."},

/* ---- Hardware (Core 1, 25%) ---- */
{d:"hw",q:"Which RAID level mirrors data across two drives with no striping?",o:["RAID 0","RAID 1","RAID 5","RAID 10"],a:1,e:"RAID 1 = mirroring (redundancy, half capacity). RAID 0 = striping (speed, no redundancy). RAID 5 = striping with parity (3+ drives). RAID 10 = mirror + stripe (4+ drives)."},
{d:"hw",q:"Which RAID level requires at least three drives and uses distributed parity?",o:["RAID 0","RAID 1","RAID 5","RAID 10"],a:2,e:"RAID 5 stripes data with parity across 3+ drives and can survive one drive failure. RAID 10 needs 4 drives; RAID 0/1 need 2."},
{d:"hw",q:"Which storage interface offers the fastest speeds for an M.2 SSD?",o:["SATA III","NVMe (PCIe)","IDE","SCSI"],a:1,e:"NVMe runs over PCIe lanes and vastly outperforms SATA III (~600 MB/s cap). An M.2 slot may carry either — NVMe is the fast one."},
{d:"hw",q:"Which PCIe slot size is standard for installing a graphics card?",o:["x1","x4","x8","x16"],a:3,e:"GPUs use PCIe x16 slots for maximum bandwidth. x1/x4 slots host NICs, sound cards, and other low-bandwidth cards."},
{d:"hw",q:"In a laser printer, which component melts toner onto the paper?",o:["Drum","Transfer belt","Fuser assembly","Pickup roller"],a:2,e:"The fuser uses heat and pressure to bond toner to paper — which is why pages exit warm, and why smearing that wipes off points to a fuser fault."},
{d:"hw",q:"What is the correct order of the laser printing process?",o:["Charging, exposing, processing, developing, transferring, fusing, cleaning","Processing, charging, exposing, developing, transferring, fusing, cleaning","Exposing, charging, developing, processing, fusing, transferring, cleaning","Processing, exposing, charging, transferring, developing, cleaning, fusing"],a:1,e:"Processing → charging → exposing → developing → transferring → fusing → cleaning. A consistent drag-and-drop PBQ topic."},
{d:"hw",q:"Which motherboard form factor is the smallest of these?",o:["ATX","Micro-ATX","Mini-ITX","E-ATX"],a:2,e:"Mini-ITX (17×17 cm) < Micro-ATX < ATX < E-ATX. Smaller boards have fewer expansion slots."},
{d:"hw",q:"Which type of RAM detects and corrects single-bit memory errors, and is common in servers?",o:["DDR5 non-ECC","ECC RAM","SO-DIMM","VRAM"],a:1,e:"ECC (Error-Correcting Code) RAM fixes single-bit errors on the fly — standard in servers and workstations where data integrity matters."},
{d:"hw",q:"Which power connector supplies the main power to a modern motherboard?",o:["4-pin Molex","24-pin ATX","8-pin EPS","6-pin PCIe"],a:1,e:"The 24-pin ATX connector is the main board feed. The 8-pin EPS powers the CPU; 6/8-pin PCIe connectors power graphics cards."},
{d:"hw",q:"Which display connector carries both video and audio and is most common on TVs?",o:["VGA","DVI-D","HDMI","Serial"],a:2,e:"HDMI carries video + audio. VGA is analog video only; DVI-D is digital video only. DisplayPort also carries both and dominates on monitors."},
{d:"hw",q:"A technician needs to print multi-part carbon forms in a warehouse. Which printer type is required?",o:["Laser","Inkjet","Thermal","Impact (dot matrix)"],a:3,e:"Only impact printers physically strike the page, so they're the only type that can print through multi-part carbon forms."},

/* ---- Virtualization & Cloud (Core 1, 11%) ---- */
{d:"cloud",q:"Which hypervisor type runs directly on hardware without a host operating system?",o:["Type 1 (bare metal)","Type 2 (hosted)","Container engine","Emulator"],a:0,e:"Type 1 (e.g., VMware ESXi, Hyper-V Server) runs on bare metal. Type 2 (VirtualBox, VMware Workstation) runs on top of a normal OS."},
{d:"cloud",q:"In which cloud model does the provider manage everything and you simply use the application (e.g., Gmail)?",o:["IaaS","PaaS","SaaS","DaaS"],a:2,e:"SaaS = ready-to-use software. PaaS gives you a platform to deploy your code; IaaS gives raw infrastructure (VMs, storage) that you manage from the OS up."},
{d:"cloud",q:"A developer wants to deploy code without managing servers or operating systems. Which cloud model fits best?",o:["IaaS","PaaS","SaaS","On-premises"],a:1,e:"PaaS (e.g., Heroku, Azure App Service) manages the OS and runtime — the developer just deploys the application."},
{d:"cloud",q:"Which cloud characteristic lets resources automatically scale up during a traffic spike and back down afterward?",o:["Measured service","Rapid elasticity","Resource pooling","Broad network access"],a:1,e:"Rapid elasticity is on-demand scaling. Measured service is pay-per-use metering; resource pooling is sharing hardware across tenants."},
{d:"cloud",q:"What is a key difference between containers and virtual machines?",o:["Containers include a full guest OS","Containers share the host OS kernel","VMs start faster than containers","VMs use less disk space"],a:1,e:"Containers share the host kernel, making them lightweight and fast to start. Each VM carries a full guest OS."},
{d:"cloud",q:"Which cloud deployment model mixes on-premises private infrastructure with public cloud services?",o:["Public","Private","Hybrid","Community"],a:2,e:"Hybrid cloud combines private + public, letting sensitive workloads stay in-house while bursting to public cloud as needed."},
{d:"cloud",q:"Before applying a risky update to a VM, what should the technician create to enable instant rollback?",o:["A container","A snapshot","A clone of the host","A RAID mirror"],a:1,e:"A VM snapshot captures the current state so you can revert instantly if the update breaks something."},
{d:"cloud",q:"What is a common use of a sandbox virtual machine?",o:["Hosting production databases","Safely testing suspicious software","Increasing GPU performance","Extending Wi-Fi range"],a:1,e:"A sandbox VM isolates untrusted software from the host — if malware detonates, you revert the snapshot and the host is untouched."},
{d:"cloud",q:"Which term describes cloud billing where you pay only for the resources you consume?",o:["Rapid elasticity","Measured service","High availability","Load balancing"],a:1,e:"Measured (metered) service is the pay-as-you-go model — usage is tracked and billed accordingly."},

/* ---- HW & Network Troubleshooting (Core 1, 29%) ---- */
{d:"hwts",q:"What is the FIRST step of the CompTIA troubleshooting methodology?",o:["Establish a theory of probable cause","Identify the problem","Test the theory","Document findings"],a:1,e:"1) Identify the problem, 2) establish a theory, 3) test the theory, 4) establish a plan, 5) implement, 6) verify full functionality, 7) document. Memorize the order."},
{d:"hwts",q:"After implementing a solution, what should a technician do NEXT according to the methodology?",o:["Document findings","Verify full system functionality","Establish a new theory","Escalate the ticket"],a:1,e:"Verify full functionality (and implement preventive measures) comes after implementing the fix; documentation is the final step."},
{d:"hwts",q:"A hard drive is making rhythmic clicking noises and files are disappearing. What should the technician do FIRST?",o:["Defragment the drive","Back up the data immediately","Run chkdsk overnight","Replace the SATA cable"],a:1,e:"Clicking = imminent mechanical failure. Back up data before anything else — diagnostics can wait, the data can't."},
{d:"hwts",q:"A workstation reports a S.M.A.R.T. error at boot. What does this indicate?",o:["The RAM failed POST","The storage drive predicts imminent failure","The BIOS battery is dead","The GPU driver is corrupt"],a:1,e:"S.M.A.R.T. is the drive's self-monitoring system. An error means back up now and replace the drive."},
{d:"hwts",q:"A PC powers on, fans spin, but nothing appears on screen and it emits a repeating beep pattern. What are the beeps?",o:["A Windows error","POST beep codes indicating a hardware fault","Normal startup sounds","The PSU failing"],a:1,e:"POST beep codes signal pre-boot hardware failures (commonly RAM or GPU). Count the pattern and check the board vendor's code table."},
{d:"hwts",q:"A laptop shuts down under load and the fan area is extremely hot. After cleaning dust, what else is a likely fix?",o:["Replacing the CMOS battery","Reapplying thermal paste","Adding more RAM","Updating the browser"],a:1,e:"Dried-out thermal paste is a classic cause of overheating shutdowns. Clean the heatsink/fan and reapply paste."},
{d:"hwts",q:"Laser-printed pages show a faint duplicate of the previous page's image. Which component is faulty?",o:["Toner cartridge","Fuser assembly","Pickup rollers","Print driver"],a:1,e:"'Ghosting' — a faint repeat image — points to the fuser (or drum) failing to fully release/clean. Fuser is the classic answer."},
{d:"hwts",q:"A user can reach devices on the local network but not any websites. ipconfig shows a valid IP and gateway. What should be checked NEXT?",o:["The Ethernet cable","DNS settings — try pinging an IP like 8.8.8.8","The keyboard drivers","The printer spooler"],a:1,e:"Local works, internet doesn't: test connectivity to a raw IP. If pinging 8.8.8.8 works but names fail, it's DNS."},
{d:"hwts",q:"Which command traces the route packets take to a destination on Windows?",o:["ping","tracert","netstat","nslookup"],a:1,e:"tracert shows each hop to the destination — useful for finding where the path breaks. (Linux/macOS: traceroute.)"},
{d:"hwts",q:"A network link works but is much slower than expected, and the switch port shows late collisions. What is the likely cause?",o:["A DNS misconfiguration","A duplex mismatch","An APIPA address","A bad power supply"],a:1,e:"One end full-duplex, the other half-duplex = duplex mismatch → collisions and slow throughput. Set both to auto-negotiate."},
{d:"hwts",q:"A PC randomly reboots and you notice bulging capacitors on the motherboard. What is the fix?",o:["Reinstall Windows","Replace the motherboard","Flash the BIOS","Add a surge protector"],a:1,e:"Bulging/leaking capacitors mean the board is failing — replacement is the reliable fix."},

/* ---- Operating Systems (Core 2, 30%) ---- */
{d:"os",q:"Which hardware component is required to upgrade a PC to Windows 11?",o:["TPM 2.0","A discrete GPU","ECC RAM","An optical drive"],a:0,e:"Windows 11 requires TPM 2.0, Secure Boot-capable UEFI, and a supported CPU. TPM questions are a favorite on the 220-1202."},
{d:"os",q:"Which Windows edition feature encrypts an entire drive and can use the TPM chip?",o:["EFS","BitLocker","Windows Hello","Storage Spaces"],a:1,e:"BitLocker is full-disk encryption (Pro and up), often keyed via TPM. EFS encrypts individual files/folders, not the whole disk."},
{d:"os",q:"Which command scans and repairs corrupted Windows system files?",o:["chkdsk /f","sfc /scannow","diskpart","ipconfig /flushdns"],a:1,e:"sfc /scannow (System File Checker) verifies and repairs protected system files. chkdsk checks the disk/file system instead."},
{d:"os",q:"Which command checks a disk for file system errors and bad sectors?",o:["sfc /scannow","chkdsk","gpupdate","netstat"],a:1,e:"chkdsk scans the volume; /f fixes errors, /r locates bad sectors. sfc repairs system files, not the disk."},
{d:"os",q:"Which Linux command changes file permissions?",o:["chown","chmod","grep","ps"],a:1,e:"chmod changes permissions (e.g., chmod 755 file). chown changes ownership. Linux basics are new on the 220-1202."},
{d:"os",q:"Which Linux command searches for text patterns inside files?",o:["find","ls","grep","kill"],a:2,e:"grep searches file contents for a pattern (grep 'error' log.txt). find locates files by name/attributes; ls just lists."},
{d:"os",q:"On Ubuntu, which command installs software from the package repositories?",o:["sudo apt install","chmod install","tar install","grep install"],a:0,e:"apt is Debian/Ubuntu's package manager; sudo elevates the command. (Red Hat family uses yum/dnf.)"},
{d:"os",q:"Which partition scheme is required to boot from drives larger than 2 TB with UEFI?",o:["MBR","GPT","FAT32","exFAT"],a:1,e:"GPT supports huge drives and 128+ partitions and pairs with UEFI. MBR is legacy — 2 TB max, 4 primary partitions."},
{d:"os",q:"Which built-in macOS utility handles automatic backups?",o:["Keychain","Spotlight","Time Machine","FileVault"],a:2,e:"Time Machine does versioned backups. FileVault is disk encryption, Keychain stores passwords, Spotlight is search."},
{d:"os",q:"A technician needs to see why a service failed to start. Which Windows tool shows system and application logs?",o:["Task Manager","Event Viewer","Device Manager","msconfig"],a:1,e:"Event Viewer holds System/Application/Security logs — the first stop for diagnosing service failures and crashes."},
{d:"os",q:"Which Windows tool would you use to disable a faulty device's driver?",o:["Task Scheduler","Device Manager","Event Viewer","Registry Editor"],a:1,e:"Device Manager manages hardware: update, roll back, or disable drivers there."},

/* ---- Security (Core 2, 27%) ---- */
{d:"sec",q:"Which malware type encrypts a victim's files and demands payment for the decryption key?",o:["Worm","Trojan","Ransomware","Spyware"],a:2,e:"Ransomware encrypts data and extorts payment. Best defense: tested offline backups."},
{d:"sec",q:"Which malware hides deep in the OS, often concealing itself from antivirus and Task Manager?",o:["Adware","Rootkit","Keylogger","Worm"],a:1,e:"Rootkits gain privileged access and hide their presence — often requiring boot-time scans or a full rebuild to remove."},
{d:"sec",q:"An attacker calls pretending to be the help desk and asks a user for their password. What is this attack?",o:["Phishing","Vishing","Smishing","Tailgating"],a:1,e:"Vishing = voice phishing (phone). Phishing = email, smishing = SMS. Know all three definitions cold."},
{d:"sec",q:"An unauthorized person slips through a secure door right behind an employee who badged in. What is this called?",o:["Shoulder surfing","Tailgating","Dumpster diving","Evil twin"],a:1,e:"Tailgating (piggybacking) is following an authorized person through access control. Mantraps/access control vestibules prevent it."},
{d:"sec",q:"Which principle states users should only have the access needed to do their job — and nothing more?",o:["Zero-day","Least privilege","Single sign-on","Non-repudiation"],a:1,e:"Least privilege limits blast radius when an account is compromised. It's the core of access control design."},
{d:"sec",q:"A user logs in with a password plus a code from an authenticator app. What is this an example of?",o:["Single sign-on","Multifactor authentication","Least privilege","Biometrics"],a:1,e:"MFA combines factors: something you know (password) + something you have (app/token) or are (biometric)."},
{d:"sec",q:"An attacker sets up a rogue Wi-Fi access point with the same SSID as a coffee shop's network to intercept traffic. What is this attack?",o:["Evil twin","War driving","Bluejacking","DDoS"],a:0,e:"An evil twin impersonates a legitimate AP so victims connect through the attacker. VPNs and HTTPS mitigate the damage."},
{d:"sec",q:"In CompTIA's malware removal procedure, what must be disabled in Windows before remediating?",o:["Windows Firewall","System Restore","Secure Boot","UAC"],a:1,e:"Disable System Restore so infected restore points can't reinfect the machine. Full order: identify → quarantine → disable System Restore → remediate (safe mode) → schedule scans → re-enable System Restore → educate the user."},
{d:"sec",q:"What is the FINAL step of CompTIA's malware removal process?",o:["Quarantine the system","Schedule antivirus scans","Educate the end user","Update anti-malware signatures"],a:2,e:"Educating the user comes last — prevention is the endgame. Removal steps are directly tested, often as drag-and-drop PBQs."},
{d:"sec",q:"Which Windows feature prompts for confirmation when a program tries to make system-level changes?",o:["SmartScreen","BitLocker","User Account Control (UAC)","Windows Hello"],a:2,e:"UAC intercepts privilege elevation with a consent prompt, limiting silent system changes by malware."},
{d:"sec",q:"Why is MAC address filtering considered a weak security control on its own?",o:["It slows the network down","MAC addresses are easily spoofed","It blocks WPA3","It only works on 5 GHz"],a:1,e:"Attackers can trivially clone an allowed MAC address. Filtering adds minor friction, not real security — pair with WPA2/WPA3."},

/* ---- Software Troubleshooting (Core 2, 26%) ---- */
{d:"swts",q:"Windows fails to boot with a 'BOOTMGR is missing' style error. Which command rebuilds the boot configuration data?",o:["sfc /scannow","bootrec /rebuildbcd","chkdsk /r","diskpart clean"],a:1,e:"From the Recovery Environment: bootrec /fixmbr, /fixboot, and /rebuildbcd repair boot records. /rebuildbcd rebuilds the BCD store."},
{d:"swts",q:"Which environment do you boot into to run Startup Repair or System Restore when Windows won't start?",o:["BIOS setup","Windows Recovery Environment (WinRE)","Safe Mode with Networking","Task Manager"],a:1,e:"WinRE hosts Startup Repair, System Restore, image recovery, and a command prompt. It launches automatically after failed boots or via installation media."},
{d:"swts",q:"A PC is suspected of malware infection. Which startup mode loads Windows with only essential drivers for remediation?",o:["Clean boot","Safe Mode","Fast startup","Recovery console"],a:1,e:"Safe Mode loads a minimal driver set, preventing most malware from activating so tools can remove it."},

const KEY="aplus_v1";
let S = load();
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw);}catch(e){}
  return {focus:DOMAINS.map(d=>d.id), qstats:{}, sessions:0};
}
S.aiQ = S.aiQ||[];  S.apiKey = S.apiKey||"";  S.model = S.model||"claude-haiku-4-5-20251001";
S.provider = S.provider||"gemini"; S.gemKey = S.gemKey||""; S.gemModel = S.gemModel||"gemini-3-flash";
S.supaUrl=S.supaUrl||""; S.supaKey=S.supaKey||""; if(S.syncKeys===undefined)S.syncKeys=true; S.updatedAt=S.updatedAt||0;
S.theme=S.theme||"dark"; S.quizLen=S.quizLen||10; if(S.shuffleOpts===undefined)S.shuffleOpts=true;
S.feedback=S.feedback||"each"; S.examDate=S.examDate||""; S.dailyGoal=S.dailyGoal||20;
S.daily=S.daily||{date:"",count:0}; S.streak=S.streak||{count:0,last:""}; S.sbCollapsed=!!S.sbCollapsed;
function todayStr(){ return new Date().toISOString().slice(0,10); }
QUESTIONS.push(...S.aiQ);   // restore AI-generated questions from previous sessions
function save(){ S.updatedAt=Date.now(); try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){ console.warn("Could not save progress:",e); }
  if(typeof scheduleCloudPush==="function") scheduleCloudPush(); }
/* Stats are keyed by a hash of the question text, not its position in the array,
   so adding questions in a future update never scrambles existing progress. */
function qkey(q){ let h=0; const s=q.q||""; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return "q"+(h>>>0).toString(36); }
function qs(q){ const k=qkey(q); return S.qstats[k] || (S.qstats[k]={seen:0,right:0,wrong:0,lastWrong:false}); }
function qstat(q){ return S.qstats[qkey(q)]; }
(function migrateStats(){
  const keys=Object.keys(S.qstats||{});
  if(!keys.some(k=>/^\d+$/.test(k))) return;      // already migrated
  const next={};
  keys.forEach(k=>{
    if(/^\d+$/.test(k)){ const q=QUESTIONS[+k]; if(q) next[qkey(q)]=S.qstats[k]; }
    else next[k]=S.qstats[k];
  });
  S.qstats=next; save();
})();

function domainStats(id){
  let seen=0,right=0;
  QUESTIONS.forEach(q=>{ const st=qstat(q); if(q.d===id && st){ seen+=st.seen; right+=st.right; }});
  return {seen, right, acc: seen? right/seen : null};
}
function missedList(){ return QUESTIONS.map((q,i)=>({...q,i})).filter(q=>{ const st=qstat(q); return st && st.lastWrong; }); }
function gapScores(){
  return DOMAINS.map(d=>{
    const st=domainStats(d.id);
    const acc = st.acc===null ? 0.35 : st.acc; // untested domains treated as weak-ish
    return {...d, ...st, priority: d.weight*(1-acc)};
  }).sort((a,b)=>b.priority-a.priority);
}

function accColor(a){ return a===null?"var(--muted)": a>=0.85?"var(--good)": a>=0.65?"var(--warn)":"var(--bad)"; }
function dashView(){
  const gaps=gapScores();
  const totalSeen=Object.values(S.qstats).reduce((s,q)=>s+q.seen,0);
  const totalRight=Object.values(S.qstats).reduce((s,q)=>s+q.right,0);
  const overall= totalSeen? Math.round(100*totalRight/totalSeen):null;
  const missed=missedList().length;
  const bars=c=>DOMAINS.filter(d=>d.core===c).map(d=>{
    const st=domainStats(d.id); const pct= st.acc===null?0:Math.round(st.acc*100);
    return `<div class="bar-row"><div class="bar-label"><span>${d.name} <span class="pct">· ${d.weight}% of exam</span></span>
      <span class="pct">${st.acc===null?"not tested":pct+"% ("+st.right+"/"+st.seen+")"}</span></div>
      <div class="bar"><div style="width:${st.acc===null?3:pct}%;background:${accColor(st.acc)}"></div></div></div>`;}).join("");
  return `

    <div class="muted">Overall accuracy</div>
    <div class="result-big" style="color:${overall===null?'var(--muted)':overall>=85?'var(--good)':overall>=65?'var(--warn)':'var(--bad)'}">${overall===null?"—":overall+"%"}</div>

      <span class="pill">${ic("target")} Today ${S.daily.date===todayStr()?S.daily.count:0}/${S.dailyGoal}</span>
      ${S.streak.count?`<span class="pill">${ic("flame")} ${S.streak.count}-day streak</span>`:""}
    </div>
    <div class="row" style="justify-content:center;margin-top:14px">
      ${hasSession()?`<button class="btn" onclick="resumeSession()">Resume quiz (${Math.min((S.session.idx||0)+1,S.session.items.length)}/${S.session.items.length})</button>`:""}
      <button class="btn${hasSession()?" secondary":""}" onclick="startQuiz('quick')">Quick quiz (${S.quizLen})</button>
      <button class="btn secondary" ${missed?"":"disabled"} onclick="startQuiz('missed')">Review missed (${missed})</button>
    </div>

      <span class="score" style="color:${accColor(g.acc)}">${g.acc===null?"untested":Math.round(g.acc*100)+"%"}</span></div>`).join("")}
    <button class="btn small secondary" style="margin-top:6px" onclick="startGapQuiz()">Drill my top gaps</button>
  </div>
  <div class="grid2">
    <div class="card"><h3>Core 1 · 220-1201</h3>${bars(1)}</div>
    <div class="card"><h3>Core 2 · 220-1202</h3>${bars(2)}</div>
  </div>`;
}

/* ================= QUIZ ================= */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pool(ids){ return QUESTIONS.map((q,i)=>({...q,i})).filter(q=>ids.includes(q.d)); }

function startQuiz(mode){
  let items=[];
  if(mode==="quick"){ items=shuffle(pool(S.focus.length?S.focus:DOMAINS.map(d=>d.id))).slice(0,S.quizLen); }
  else if(mode==="missed"){ items=shuffle(missedList()); }
  else if(mode==="core1"||mode==="core2"){
    const core=mode==="core2"?2:1, n=20;
    const doms=DOMAINS.filter(d=>d.core===core);
    const tw=doms.reduce((s,d)=>s+d.weight,0);
    doms.forEach(d=>{ const take=Math.max(1,Math.round(n*d.weight/tw));
      items.push(...shuffle(pool([d.id])).slice(0,take)); });
    items=shuffle(items);
  }
  if(!items.length){ alert("No questions available for that mode yet."); return; }
  quiz={items:prep(items), idx:0, right:0, answered:null, results:[]};
  tab="quiz"; persistSession(); render();
}
function prep(items){ return items.map(it=>({...it, perm:S.shuffleOpts?shuffle([0,1,2,3]):[0,1,2,3]})); }
/* ---- session persistence: an unfinished quiz survives tab switches and page reloads ---- */
function persistSession(){
  if(quiz && !quiz.done){
    S.session={items:quiz.items, idx:quiz.idx, right:quiz.right, answered:quiz.answered,
      results:quiz.results.map(r=>({q:r.q,ok:r.ok})), at:Date.now()};
  } else S.session=null;
  save();
}
function hasSession(){ return !!(S.session && S.session.items && S.session.items.length); }
function resumeSession(){
  if(!hasSession()) return;
  const s=S.session;
  quiz={items:s.items, idx:s.idx||0, right:s.right||0, answered:(s.answered===undefined?null:s.answered), results:s.results||[]};
  tab="quiz"; render();
}
function endQuiz(){
  if(quiz && !quiz.done && !confirm("End this quiz? Your answered questions are already saved.")) return;
  quiz=null; S.session=null; save(); render();
}
function sessionCard(){
  if(!hasSession()) return "";
  const s=S.session, done=s.idx||0, total=s.items.length;
  const ago=Math.round((Date.now()-(s.at||Date.now()))/60000);
  return `<div class="card"><h2>${ic("pencil")}Quiz in progress</h2>
    <div class="muted" style="margin-bottom:12px">You're on question ${Math.min(done+1,total)} of ${total}${ago>0?` · paused ${ago<60?ago+" min":Math.round(ago/60)+" hr"} ago`:""}.</div>
    <div class="row">
      <button class="btn" onclick="resumeSession()">Resume quiz</button>
      <button class="btn secondary" onclick="endQuiz()">Discard</button>
    </div></div>`;
}
function startGapQuiz(){
  const top=gapScores().slice(0,3).map(g=>g.id);
  const items=shuffle(pool(top)).slice(0,12);
  quiz={items:prep(items), idx:0, right:0, answered:null, results:[]};
  tab="quiz"; persistSession(); render();
}
function answer(k){
  if(quiz.answered!==null) return;
  const q=quiz.items[quiz.idx], st=qs(q), ok=(k===q.a);
  quiz.answered=k; st.seen++; ok?(st.right++,quiz.right++):st.wrong++;
  st.lastWrong=!ok; quiz.results.push({q,ok});
  const t=todayStr();
  if(S.daily.date!==t) S.daily={date:t,count:0,hit:false};
  S.daily.count++;
  // >= (not ===) so lowering your goal mid-day still counts; hit flag stops double-counting
  if(!S.daily.hit && S.daily.count>=S.dailyGoal){
    S.daily.hit=true;
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak.count = S.streak.last===y ? S.streak.count+1 : 1;
    S.streak.last=t;
  }
  persistSession(); render();
}
function nextQ(){
  if(quiz.idx+1>=quiz.items.length){ quiz.done=true; S.sessions++; }
  else { quiz.idx++; quiz.answered=null; }
  persistSession(); render();
}

function aiReady(){ return S.provider==="gemini" ? !!S.gemKey : !!S.apiKey; }
const FETCH_HELP = "The browser blocked the request ('failed to fetch'). Fixes, in order: 1) launch the app with start-app.bat instead of double-clicking the HTML file; 2) turn off ad-blockers/privacy extensions for this page; 3) check your internet/VPN/firewall.";
async function callClaude(messages, system, maxTokens){
  if(!aiReady()){ openSettings(); throw new Error("Add your API key first (Settings → AI setup)."); }
  if(S.provider==="gemini") return callGemini(messages, system, maxTokens);
  let r;
  try{
    r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{ "content-type":"application/json", "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body:JSON.stringify({ model:S.model, max_tokens:maxTokens||800, system, messages })
    });
  }catch(err){ throw new Error(FETCH_HELP); }
  let j; try{ j = await r.json(); }catch(e){ throw new Error("Anthropic returned an unreadable response (HTTP "+r.status+"). Try again in a moment."); }
  if(j.error) throw new Error(j.error.message||"API error");
  if(!j.content) throw new Error("No response returned (HTTP "+r.status+").");
  return j.content.map(b=>b.text||"").join("");
}
async function callGemini(messages, system, maxTokens){
  const url="https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(S.gemModel)+":generateContent?key="+encodeURIComponent(S.gemKey);
  let r;
  try{
    r = await fetch(url,{ method:"POST", headers:{"content-type":"application/json"},
      body:JSON.stringify({
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        systemInstruction:{parts:[{text:system||""}]},
        generationConfig:{maxOutputTokens:maxTokens||800}
      })});
  }catch(err){ throw new Error(FETCH_HELP); }
  let j; try{ j = await r.json(); }catch(e){ throw new Error("Gemini returned an unreadable response (HTTP "+r.status+"). Try again in a moment."); }
  if(j.error){
    const m=String(j.error.message||"Gemini API error");
    if(/not found|not supported|unsupported|invalid model/i.test(m))
      throw new Error('The model "'+S.gemModel+'" isn\'t available on your key. Open Settings → AI setup and click "Fetch live model list", then pick one and Save.');
    throw new Error(m+(/quota|rate/i.test(m)?" — free-tier limit hit; wait a minute and retry.":""));
  }
  const cand=j.candidates&&j.candidates[0];
  if(!cand||!cand.content||!cand.content.parts) throw new Error("Gemini returned no text (possibly rate-limited or blocked) — wait a moment and retry.");
  return cand.content.parts.map(p=>p.text||"").join("");
}

}

async function runGen(){
  const sel=document.getElementById("gen-dom"); const btn=document.getElementById("gen-btn");
  const domId=sel.value, dom=DOMAINS.find(d=>d.id===domId);
  btn.disabled=true; btn.textContent="Generating… (few seconds)";
  const prompt="Generate 5 challenging multiple-choice practice questions for the CompTIA A+ exams "
   +"(220-1201/220-1202), domain: \""+dom.name+"\". Match the real exam's style: scenario-based where possible. "
   +"Do not repeat these existing topics too closely: "
   + QUESTIONS.filter(q=>q.d===domId).slice(0,20).map(q=>q.q).join(" ~ ").slice(0,1500)
   +". Respond with ONLY a JSON array, no markdown fences, in this exact shape: "
   +'[{"q":"question text","o":["opt1","opt2","opt3","opt4"],"a":0,"e":"explanation"}] where a is the index of the correct option.';
  try{
    let out=await callClaude([{role:"user",content:prompt}], "You output only valid JSON.", 2500);
    out=out.replace(/^```(json)?/m,"").replace(/```\s*$/m,"").trim();
    const arr=JSON.parse(out.slice(out.indexOf("["), out.lastIndexOf("]")+1));
    const good=arr.filter(x=>x&&x.q&&Array.isArray(x.o)&&x.o.length===4&&x.a>=0&&x.a<4&&x.e)
      .map(x=>({d:domId,q:x.q,o:x.o,a:x.a,e:x.e,ai:true}));
    if(!good.length) throw new Error("The AI returned no usable questions — try again.");
    const startIdx=QUESTIONS.length;
    QUESTIONS.push(...good); S.aiQ.push(...good); save();
    const items=good.map((q,k)=>({...q,i:startIdx+k}));
    quiz={items:prep(items),idx:0,right:0,answered:null,results:[]}; tab="quiz"; persistSession(); render();
  }catch(e){
    btn.disabled=false; btn.innerHTML=ic("zap")+" Generate 5 AI questions";
    document.getElementById("gen-msg").innerHTML='<span class="danger">'+esc(e.message)+"</span>";
  }
}

let T={scen:null,lines:[]};
const SCENS=[
 {id:"dhcp",ip:"169.254.23.101",mask:"255.255.0.0",gw:"",dns:"",
  hint:"Run ipconfig and look hard at the IPv4 address. What range does 169.254.x.x belong to, and who hands out addresses normally?",

 {id:"dns",ip:"192.168.1.42",mask:"255.255.255.0",gw:"192.168.1.1",dns:"192.168.1.53",

  explain:"Pinging 8.8.8.8 works but names fail — connectivity is fine, name resolution is broken: a DNS problem. Fix: point the client at a working DNS server (or fix the DNS server), then ipconfig /flushdns."},
 {id:"gateway",ip:"192.168.1.42",mask:"255.255.255.0",gw:"192.168.1.1",dns:"8.8.8.8",
  hint:"Ping another local machine like 192.168.1.7, then ping the default gateway 192.168.1.1. Compare.",
  explain:"Local peers reply but the default gateway doesn't — the router (default gateway) is down or unreachable, so nothing beyond the LAN works. tracert dies at the first hop. Fix: power-cycle/repair the router or its switch link."},
];
function termInit(){
  T={scen:SCENS[Math.floor(Math.random()*SCENS.length)],lines:[]};
  tp("Ticket #4821 — user reports: \"the internet is down on my PC.\"","sys");
  tp("Investigate with: ipconfig [/all|/renew|/flushdns], ping <ip|name>, tracert <ip|name>, nslookup <name>","sys");
  tp("When you're confident:  diagnose dhcp | dns | gateway     (also: hint, new, clear, help)","sys");
  tp("");
}
function tp(t,c){ T.lines.push({t,c:c||""}); }
function termSubmit(ev){ if(ev.key!=="Enter")return; const i=ev.target; termExec(i.value); i.value=""; render(); }
function termExec(raw){
  const cmd=raw.trim(); if(!cmd) return;
  tp("C:\\Users\\tafe> "+cmd,"cmd");
  const s=T.scen, p=cmd.toLowerCase().split(/\s+/), c0=p[0];
  const isName=t=>/[a-z]/i.test(t)&&!/^\d+(\.\d+){3}$/.test(t);
  const local=t=>t.startsWith("192.168.1.")&&t!==s.gw;
  if(c0==="help"){ tp("Commands: ipconfig [/all|/renew|/flushdns], ping <target>, tracert <target>, nslookup <name>, diagnose <dhcp|dns|gateway>, hint, new, clear"); }
  else if(c0==="clear"){ T.lines=[]; }
  else if(c0==="new"){ termInit(); }
  else if(c0==="hint"){ tp(">> HINT: "+s.hint,"sys"); }
  else if(c0==="ipconfig"){
    if(p[1]==="/renew"){
      if(s.id==="dhcp"){ tp("An error occurred while renewing interface Ethernet0:","err"); tp("unable to contact your DHCP server. Request has timed out.","err"); }
      else tp("IPv4 Address renewed: "+s.ip);
    } else if(p[1]==="/flushdns"){ tp("Successfully flushed the DNS Resolver Cache."+(s.id==="dns"?" (Names still fail — the cache wasn't the problem.)":"")); }
    else {
      tp("Ethernet adapter Ethernet0:"); tp("");
      tp("   IPv4 Address. . . . . . . . . . . : "+s.ip+(s.id==="dhcp"?"  (Autoconfiguration)":""));
      tp("   Subnet Mask . . . . . . . . . . . : "+s.mask);
      tp("   Default Gateway . . . . . . . . . : "+(s.gw||""));
      if(p[1]==="/all"){ tp("   DHCP Enabled. . . . . . . . . . . : Yes"); tp("   DNS Servers . . . . . . . . . . . : "+(s.dns||"")); }
    }
  }
  else if(c0==="ping"){
    const t=p[1]; if(!t){ tp("Usage: ping <ip or hostname>","err"); }
    else if(t==="127.0.0.1"||t===s.ip){ tp("Reply from "+t+": bytes=32 time<1ms TTL=128  (x4)","ok"); }
    else if(s.id==="dhcp"){ tp("PING: transmit failed. General failure.  (x4)","err"); }
    else if(isName(t)){
      if(s.id==="dns"||s.id==="gateway") tp("Ping request could not find host "+t+". Please check the name and try again.","err");
      else tp("Reply from 142.250.72.14: bytes=32 time=18ms TTL=115  (x4)","ok");
    }
    else if(s.id==="gateway"){
      if(local(t)) tp("Reply from "+t+": bytes=32 time=1ms TTL=128  (x4)","ok");
      else tp("Request timed out.  (x4)","err");
    }
    else { tp("Reply from "+t+": bytes=32 time="+(local(t)?"1":"17")+"ms TTL=115  (x4)","ok"); }
  }
  else if(c0==="tracert"){
    const t=p[1]; if(!t){ tp("Usage: tracert <target>","err"); }
    else if(s.id==="dhcp"){ tp("Unable to contact IP driver. General failure.","err"); }
    else if(isName(t)&&(s.id==="dns"||s.id==="gateway")){ tp("Unable to resolve target system name "+t+".","err"); }
    else if(s.id==="gateway"){ tp("Tracing route to "+t+":"); tp("  1     *        *        *     Request timed out.","err"); tp("  2     *        *        *     Request timed out.","err"); }
    else { tp("Tracing route to "+t+":"); tp("  1     1 ms   192.168.1.1","ok"); tp("  2    11 ms   100.64.0.1","ok"); tp("  3    17 ms   "+(isName(t)?"142.250.72.14":t),"ok"); }
  }
  else if(c0==="nslookup"){
    const t=p[1]||"google.com";
    if(s.id==="dhcp"){ tp("DNS request timed out. Default Server: UnKnown","err"); }
    else if(s.id==="dns"){ tp("Server: "+s.dns); tp("DNS request timed out. *** Request to "+s.dns+" timed-out","err"); }
    else if(s.id==="gateway"){ tp("Server: "+s.dns); tp("DNS request timed out. *** Request to "+s.dns+" timed-out","err"); }
    else { tp("Name: "+t); tp("Address: 142.250.72.14","ok"); }
  }
  else if(c0==="diagnose"){
    const g=p[1];
    if(!g){ tp("Usage: diagnose <dhcp|dns|gateway>","err"); }
    else if(g===s.id){ tp("[CORRECT] Diagnosis confirmed.","ok"); tp(s.explain,"ok"); tp(""); tp("Type  new  for another random ticket.","sys"); }
    else { tp("[WRONG] Not the root cause here. Re-check the evidence — try hint if stuck.","err"); }
  }
  else { tp("'"+c0+"' is not recognized. Type help for commands.","err"); }
}
