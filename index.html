/* ---- geometry helpers ---- */
function M(color,opts){ return new THREE.MeshStandardMaterial(Object.assign({color,roughness:.45,metalness:.25},opts||{})); }
/* Metals use a mid-tone base with a grey (not white) specular, so highlights read
   as shine instead of blowing out to a flat white silhouette. */
function Metal(color,shine,spec){ return new THREE.MeshPhongMaterial({color:color,specular:spec||0x8c95a3,shininess:shine||42}); }
function box(g,w,h,d,x,y,z,mat){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); g.add(m); return m; }
/* cylinder laid along the Z axis (the direction every connector points) */
function tube(g,rt,rb,len,x,y,z,mat,seg){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,len,seg||28),mat);
  m.rotation.x=Math.PI/2; m.position.set(x,y,z); g.add(m); return m;
}
function ring(g,r,t,x,y,z,mat){
  const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,10,28),mat); m.position.set(x,y,z); g.add(m); return m;
}
/* rounded rectangle path — the basis of most connector cross-sections */
function rrect(w,h,r,Cls){
  const p=new (Cls||THREE.Shape)(); const x=-w/2, y=-h/2; r=Math.min(r,Math.min(w,h)/2);
  p.moveTo(x+r,y);
  p.lineTo(x+w-r,y); p.quadraticCurveTo(x+w,y,x+w,y+r);
  p.lineTo(x+w,y+h-r); p.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  p.lineTo(x+r,y+h); p.quadraticCurveTo(x,y+h,x,y+h-r);
  p.lineTo(x,y+r); p.quadraticCurveTo(x,y,x+r,y);
  return p;
}
/* extrude a 2D shape along Z, centred on its own length */
function ext(g,shape,depth,mat,bev,x,y,z){
  const o={depth:depth,curveSegments:20,steps:1,bevelEnabled:!!bev};
  if(bev){ o.bevelSize=bev; o.bevelThickness=bev; o.bevelSegments=3; }
  const geo=new THREE.ExtrudeGeometry(shape,o);
  geo.translate(0,0,-depth/2);
  const m=new THREE.Mesh(geo,mat); m.position.set(x||0,y||0,z||0); g.add(m); return m;
}
function buildModel(id){
  const g=new THREE.Group();
  const gold   = Metal(0xb8862e,55,0xd9b45c),
        chrome = Metal(0x7e8794,48,0xa8b2c0),
        nickel = Metal(0x6c7480,38,0x97a0ad),
        copper = Metal(0xa85c22,50,0xd08c4a),
        clear  = new THREE.MeshPhysicalMaterial({color:0xdce9ff,transparent:true,opacity:.30,roughness:.06,
                   metalness:0,transmission:.55,thickness:.6,side:THREE.DoubleSide}),
        dark   = M(0x24272e,{roughness:.55,metalness:.1}),
        rubber = M(0x17191e,{roughness:.9,metalness:0}),
        ceramic= M(0xc9c9c2,{roughness:.55,metalness:0}),
        aqua   = M(0x21b6a8,{roughness:.5}),
        blue   = M(0x1f5fd0,{roughness:.45}),
        beige  = M(0xd8cdb4,{roughness:.55}),
        jacket = M(0x2b3140,{roughness:.75});
  const wireCols=[0xffffff,0xf97316,0xffffff,0x3b82f6,0xffffff,0x22c55e,0xffffff,0x92400e];

  if(id==="rj45"||id==="rj11"){
    const n=id==="rj45"?8:6, W=id==="rj45"?2.35:1.75, H=1.5;
    // clear polycarbonate housing
    ext(g,rrect(W,H,.12),3.0,clear,.04,0,0,.4);
    // front lip where the contacts sit
    ext(g,rrect(W*.86,H*.45,.08),.5,clear,0,0,H*.24,1.75);
    // gold contact blades, angled down into the housing
    const span=W*.62;
    for(let i=0;i<n;i++){
      const x=-span/2+i*span/(n-1);
      const b=box(g,.11,.62,.12,x,H*.26,1.35,gold); b.rotation.x=-0.5;
      box(g,.11,.10,.85,x,H*.42,1.05,gold);
    }
    // twisted-pair wires visible through the clear body
    for(let i=0;i<n;i++){
      const x=-span/2+i*span/(n-1);
      tube(g,.085,.085,2.5,x,-.05,.35,M(wireCols[i%8],{roughness:.6}),10);
    }
    // release latch: angled tab rising toward the cable, with a step
    const latch=box(g,W*.5,.13,1.5,0,-H/2-.05,.15,clear); latch.rotation.x=0.20;
    box(g,W*.5,.34,.16,0,-H/2-.30,-.55,clear);
    // strain-relief boot + jacket
    ext(g,rrect(W+.5,H+.45,.35),1.5,rubber,.06,0,0,-1.55);
    tube(g,.46,.46,2.2,0,0,-3.2,jacket,24);
  }

  else if(id==="lc"){
    // LC = "little connector": 6.4mm square latching body, 1.25mm ferrule
    ext(g,rrect(1.05,1.05,.10),2.3,aqua,.05,0,0,-.1);            // body (aqua = OM3/OM4 multimode)
    const latch=box(g,.55,.13,1.35,0,.62,-.35,aqua); latch.rotation.x=-0.16;  // RJ-style push latch
    box(g,.55,.30,.14,0,.72,-1.0,aqua);
    ext(g,rrect(.85,.85,.08),.55,ceramic,.03,0,0,1.25);          // front shoulder
    tube(g,.145,.145,1.15,0,0,1.95,ceramic,24);                  // 1.25mm ceramic ferrule
    tube(g,.028,.028,1.2,0,0,1.98,M(0x0a0a0a),12);               // fibre core down the middle
    ext(g,rrect(.95,.95,.3),.9,rubber,.05,0,0,-1.55);            // boot
    tube(g,.30,.30,2.0,0,0,-2.95,aqua,20);                       // aqua patch cable
  }

  else if(id==="sc"){
    // SC = "square connector", push-pull, 2.5mm ferrule, keyed shroud
    ext(g,rrect(1.45,1.45,.10),2.4,blue,.05,0,0,-.2);            // blue = single-mode
    box(g,.30,.16,1.9,0,.78,-.2,blue);                           // alignment key rib
    ext(g,rrect(1.28,1.28,.08),.85,beige,.04,0,0,1.35);          // ferrule shroud
    tube(g,.27,.27,1.1,0,0,2.05,ceramic,24);                     // 2.5mm ferrule
    tube(g,.032,.032,1.15,0,0,2.08,M(0x0a0a0a),12);
    ext(g,rrect(1.3,1.3,.4),1.0,rubber,.06,0,0,-1.9);
    tube(g,.33,.33,2.0,0,0,-3.4,blue,20);
  }

  else if(id==="st"){
    // ST = "stick and twist": round bayonet coupling with two lugs
    tube(g,.62,.62,1.9,0,0,.15,nickel,32);                       // barrel
    tube(g,.78,.78,1.0,0,0,-.35,nickel,32);                      // knurled twist collar
    for(let i=0;i<10;i++){ const a=i/10*Math.PI*2;               // knurling
      box(g,.07,.07,.9,Math.cos(a)*.78,Math.sin(a)*.78,-.35,nickel); }
    box(g,.20,.20,.30,.72,0,.85,chrome); box(g,.20,.20,.30,-.72,0,.85,chrome);  // bayonet lugs
    tube(g,.27,.27,1.15,0,0,1.55,ceramic,24);                    // 2.5mm ferrule
    tube(g,.032,.032,1.2,0,0,1.58,M(0x0a0a0a),12);
    ext(g,rrect(1.0,1.0,.35),1.1,rubber,.05,0,0,-1.55);
    tube(g,.31,.31,2.0,0,0,-3.0,M(0xff8c42,{roughness:.55}),20); // orange OM1/OM2 jacket
  }

  else if(id==="coax"){
    // F-type: hex nut, threaded barrel, exposed centre conductor
    const nut=new THREE.Mesh(new THREE.CylinderGeometry(.80,.80,1.05,6),chrome);
    nut.rotation.x=Math.PI/2; nut.position.z=-.15; g.add(nut);
    tube(g,.52,.52,1.5,0,0,1.05,chrome,28);                      // threaded section
    for(let i=0;i<7;i++) ring(g,.53,.055,0,0,.45+i*.19,chrome);  // thread ridges
    tube(g,.062,.062,3.0,0,0,1.1,copper,12);                     // solid copper centre conductor
    tube(g,.46,.46,.55,0,0,-.85,nickel,28);                      // crimp ferrule
    for(let i=0;i<3;i++) ring(g,.46,.045,0,0,-.72+i*.16,nickel);
    tube(g,.40,.40,2.4,0,0,-2.3,M(0x101216,{roughness:.85}),24); // RG-6 black jacket
  }

  else if(id==="usbc"){
    // USB-C: 8.4 x 2.6mm rounded-oval shell, 24 pins on a central tongue
    const outer=rrect(2.55,.92,.46);
    outer.holes.push(rrect(2.22,.60,.30,THREE.Path));
    ext(g,outer,2.0,chrome,0,0,0,1.35);                          // hollow metal shell
    ext(g,rrect(2.22,.60,.30),.12,dark,0,0,0,.36);               // back wall inside the shell
    ext(g,rrect(1.86,.20,.10),1.65,dark,.02,0,0,1.5);            // central tongue
    for(let s=0;s<2;s++){                                        // 12 gold pads per side
      for(let i=0;i<12;i++){
        box(g,.10,.035,.62,-.82+i*.15,(s?1:-1)*.115,1.62,gold);
      }
    }
    ext(g,rrect(2.9,1.35,.55),2.3,dark,.10,0,0,-.85);            // overmoulded body
    ext(g,rrect(2.55,1.15,.5),.18,M(0x3a3f48),.02,0,0,.32);      // trim ring at the collar
    ext(g,rrect(1.4,.9,.4),1.1,rubber,.08,0,0,-2.4);             // strain relief
    tube(g,.36,.36,2.0,0,0,-3.85,rubber,24);                     // cable
  }
  return g;
}
function init3D(){
  const cv=document.getElementById("c3d"); if(!cv) return;
  if(typeof THREE==="undefined"){ cv.outerHTML='<div class="card"><p class="muted">3D library couldn\'t load — check your internet connection and reopen this lab.</p></div>'; return; }
  stop3D();
  const wpx=cv.clientWidth||800, hpx=340;
  const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setSize(wpx,hpx,false); renderer.setPixelRatio(window.devicePixelRatio||1);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,wpx/hpx,.1,100); camera.position.set(0,1.2,8);
  scene.add(new THREE.AmbientLight(0xffffff,.22));
  scene.add(new THREE.HemisphereLight(0xc9d8f0,0x22262f,.40));           // sky/ground fill
  const key=new THREE.DirectionalLight(0xffffff,.72); key.position.set(5,7,6); scene.add(key);
  const fill=new THREE.DirectionalLight(0x9ab4e8,.30); fill.position.set(-6,-1,-4); scene.add(fill);
  const spec=new THREE.PointLight(0xffffff,.42,45); spec.position.set(2,3.5,6); scene.add(spec);
  const spec2=new THREE.PointLight(0xa8c0f0,.26,45); spec2.position.set(-4,-2,3); scene.add(spec2);
  const group=buildModel(C3D.cur); group.rotation.set(.35,.7,0); scene.add(group);
  Object.assign(C3D,{renderer,scene,camera,group,drag:false,idle:0});
  cv.onpointerdown=e=>{C3D.drag=true;C3D.px=e.clientX;C3D.py=e.clientY;cv.setPointerCapture(e.pointerId);};
  cv.onpointermove=e=>{ if(!C3D.drag)return;
    group.rotation.y+=(e.clientX-C3D.px)*.01; group.rotation.x+=(e.clientY-C3D.py)*.01;
    group.rotation.x=Math.max(-1.4,Math.min(1.4,group.rotation.x));
    C3D.px=e.clientX;C3D.py=e.clientY;C3D.idle=0; };
  cv.onpointerup=()=>{C3D.drag=false;};
  cv.onwheel=e=>{e.preventDefault(); camera.position.z=Math.max(3.5,Math.min(14,camera.position.z+e.deltaY*.005));};
  (function loop(){
    C3D.raf=requestAnimationFrame(loop);
    if(!C3D.drag){ C3D.idle++; if(C3D.idle>90) group.rotation.y+=.004; }
    renderer.render(scene,camera);
  })();
}

/* ================= CLOUD ACCOUNTS (Supabase) =================
   Static site + Supabase = real accounts with no server of your own.
   The anon key is meant to be public; security comes from Row Level Security,
   which restricts every row to the user that owns it. See SUPABASE-SETUP.md. */
const SUPA_URL_BAKED = "";   // filled in once the project exists
const SUPA_KEY_BAKED = "";
const CLOUD={ sdk:null, client:null, user:null, busy:false, msg:"", applying:false, timer:null, lastSync:null };
function cloudCfg(){ return { url:(S.supaUrl||SUPA_URL_BAKED||"").trim(), key:(S.supaKey||SUPA_KEY_BAKED||"").trim() }; }
function cloudConfigured(){ const c=cloudCfg(); return !!(c.url&&c.key); }

function loadSupabase(){
  if(CLOUD.sdk) return Promise.resolve(CLOUD.sdk);
  return new Promise((res,rej)=>{
    if(typeof document==="undefined") return rej(new Error("no document"));
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
    s.onload=()=>{ CLOUD.sdk=window.supabase; CLOUD.sdk?res(CLOUD.sdk):rej(new Error("Supabase SDK failed to load")); };
    s.onerror=()=>rej(new Error("Couldn't load the Supabase library — check your internet connection."));
    document.head.appendChild(s);
  });
}
async function cloudClient(){
  if(CLOUD.client) return CLOUD.client;
  if(!cloudConfigured()) throw new Error("Add your Supabase URL and anon key first.");
  const sdk=await loadSupabase(); const c=cloudCfg();
  CLOUD.client=sdk.createClient(c.url,c.key);
  return CLOUD.client;
}
async function cloudInit(){
  if(!cloudConfigured()) return;
  try{
    const cl=await cloudClient();
    const {data}=await cl.auth.getSession();
    if(data&&data.session){ CLOUD.user=data.session.user; await cloudSync(true); }
    render();
  }catch(e){ CLOUD.msg=e.message; }
}
/* ---- merge: counters take the higher value, settings follow the newer device ---- */
function mergeState(local,remote){
  if(!remote||typeof remote!=="object") return local;
  const lNew=(local.updatedAt||0)>=(remote.updatedAt||0);
  const out=JSON.parse(JSON.stringify(lNew?local:remote));   // newer device wins on plain settings
  // question stats: monotonic counters, so take the max of each
  const stats={};
  const keys=new Set([...Object.keys(local.qstats||{}),...Object.keys(remote.qstats||{})]);
  keys.forEach(k=>{
    const a=(local.qstats||{})[k], b=(remote.qstats||{})[k];
    if(!a){ stats[k]=b; return; } if(!b){ stats[k]=a; return; }
    const primary=(a.seen||0)>=(b.seen||0)?a:b;
    stats[k]={ seen:Math.max(a.seen||0,b.seen||0), right:Math.max(a.right||0,b.right||0),
               wrong:Math.max(a.wrong||0,b.wrong||0), lastWrong:primary.lastWrong };
  });
  out.qstats=stats;
  // AI-generated questions: union by question text
  const seenQ=new Set(), aiQ=[];
  [...(local.aiQ||[]),...(remote.aiQ||[])].forEach(q=>{ if(q&&q.q&&!seenQ.has(q.q)){ seenQ.add(q.q); aiQ.push(q); } });
  out.aiQ=aiQ;
  out.sessions=Math.max(local.sessions||0,remote.sessions||0);
  // daily goal + streak: the later date wins
  const ld=local.daily||{},rd=remote.daily||{};
  out.daily = (ld.date||"")>(rd.date||"") ? ld : (rd.date||"")>(ld.date||"") ? rd
            : { date:ld.date||rd.date||"", count:Math.max(ld.count||0,rd.count||0), hit:!!(ld.hit||rd.hit) };
  const ls=local.streak||{},rs=remote.streak||{};
  out.streak = (ls.last||"")>(rs.last||"") ? ls : (rs.last||"")>(ls.last||"") ? rs
            : { last:ls.last||rs.last||"", count:Math.max(ls.count||0,rs.count||0) };
  // unfinished quiz: keep whichever was touched most recently, but never clobber one in progress here
  const lsn=local.session,rsn=remote.session;
  out.session = (quiz&&!quiz.done) ? lsn : ((lsn&&rsn) ? ((lsn.at||0)>=(rsn.at||0)?lsn:rsn) : (lsn||rsn||null));
  if(!S.syncKeys){ out.apiKey=local.apiKey; out.gemKey=local.gemKey; }   // per-device opt-out
  out.supaUrl=local.supaUrl; out.supaKey=local.supaKey;                  // connection details stay local
  return out;
}
async function cloudSync(silent){
  if(!CLOUD.user) return;
  CLOUD.busy=true; if(!silent){ CLOUD.msg="Syncing…"; render(); }
  try{
    const cl=await cloudClient();
    const {data,error}=await cl.from("progress").select("data").eq("id",CLOUD.user.id).maybeSingle();
    if(error && error.code!=="PGRST116") throw error;
    CLOUD.applying=true;
    const merged=mergeState(S,(data&&data.data)||null);
    Object.assign(S,merged);
    // rebuild the in-memory question bank with any AI questions that arrived
    (S.aiQ||[]).forEach(q=>{ if(!QUESTIONS.some(x=>x.q===q.q)) QUESTIONS.push(q); });
    CLOUD.applying=false;
    S.updatedAt=Date.now(); save();
    const payload=Object.assign({},S);
    delete payload.supaUrl; delete payload.supaKey;
    if(!S.syncKeys){ delete payload.apiKey; delete payload.gemKey; }
    const {error:upErr}=await cl.from("progress").upsert({id:CLOUD.user.id,data:payload,updated_at:new Date().toISOString()});
    if(upErr) throw upErr;
    CLOUD.lastSync=Date.now(); CLOUD.msg="";
  }catch(e){ CLOUD.msg="Sync failed: "+(e.message||e); }
  CLOUD.busy=false; render();
}
function scheduleCloudPush(){
  // save() can fire during start-up migrations, before CLOUD exists — stay silent then
  try{
    if(!CLOUD.user||CLOUD.applying) return;
    clearTimeout(CLOUD.timer);
    CLOUD.timer=setTimeout(()=>{ cloudSync(true); },4000); // debounce so a quiz doesn't spam the API
  }catch(e){ /* not ready yet */ }
}
async function cloudAuth(mode){
  const em=document.getElementById("acc-email"), pw=document.getElementById("acc-pass");
  const email=em?em.value.trim():"", pass=pw?pw.value:"";
  if(!email||!pass){ CLOUD.msg="Enter an email and password."; render(); return; }
  if(mode==="up"&&pass.length<6){ CLOUD.msg="Password must be at least 6 characters."; render(); return; }
  CLOUD.busy=true; CLOUD.msg=mode==="up"?"Creating account…":"Signing in…"; render();
  try{
    const cl=await cloudClient();
    const {data,error}= mode==="up"
      ? await cl.auth.signUp({email,password:pass})
      : await cl.auth.signInWithPassword({email,password:pass});
    if(error) throw error;
    if(!data.session && mode==="up"){ CLOUD.busy=false; CLOUD.msg="Account created — check your email to confirm, then sign in."; render(); return; }
    CLOUD.user=data.user; CLOUD.msg=""; CLOUD.busy=false;
    await cloudSync();
  }catch(e){ CLOUD.busy=false; CLOUD.msg=(e.message||String(e)); render(); }
}
async function cloudSignOut(){
  try{ const cl=await cloudClient(); await cl.auth.signOut(); }catch(e){}
  CLOUD.user=null; CLOUD.msg="Signed out — your progress stays on this device."; render();
}
function saveCloudCfg(){
  S.supaUrl=document.getElementById("supa-url").value.trim();
  S.supaKey=document.getElementById("supa-key").value.trim();
  CLOUD.client=null; save(); CLOUD.msg="Saved. Now create an account or sign in."; render();
}
function accountCard(){
  const ago=CLOUD.lastSync?Math.round((Date.now()-CLOUD.lastSync)/1000):null;
  const note=CLOUD.msg?`<div class="muted" style="margin-top:10px">${esc(CLOUD.msg)}</div>`:"";
  if(!cloudConfigured()){
    return `<div class="card"><h2>${ic("db")}Account &amp; sync</h2>
      <p class="muted" style="margin:6px 0 12px">Sync your progress across devices with a free Supabase project.
      Follow <b>SUPABASE-SETUP.md</b> in your study folder (about 5 minutes), then paste the two values below.</p>
      <label class="muted">Project URL</label>
      <input class="inp" id="supa-url" style="width:100%;margin:6px 0 10px" placeholder="https://xxxxx.supabase.co" value="${esc(S.supaUrl||"")}">
      <label class="muted">Anon public key</label>
      <input class="inp" id="supa-key" style="width:100%;margin:6px 0 12px" placeholder="eyJhbGci..." value="${esc(S.supaKey||"")}">
      <button class="btn small" onclick="saveCloudCfg()">Save connection</button>${note}</div>`;
  }
  if(!CLOUD.user){
    return `<div class="card"><h2>${ic("db")}Account &amp; sync</h2>
      <p class="muted" style="margin:6px 0 12px">Sign in to sync your progress, streak and AI questions across devices.</p>
      <input class="inp" id="acc-email" type="email" style="width:100%;margin:0 0 8px" placeholder="you@example.com" autocomplete="username">
      <input class="inp" id="acc-pass" type="password" style="width:100%;margin:0 0 12px" placeholder="Password (6+ characters)" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')cloudAuth('in')">
      <div class="row">
        <button class="btn small" ${CLOUD.busy?"disabled":""} onclick="cloudAuth('in')">Sign in</button>
        <button class="btn small secondary" ${CLOUD.busy?"disabled":""} onclick="cloudAuth('up')">Create account</button>
        <button class="btn small secondary" onclick="S.supaUrl='';S.supaKey='';CLOUD.client=null;save();render()">Change project</button>
      </div>${note}</div>`;
  }
  return `<div class="card"><h2>${ic("db")}Account &amp; sync</h2>
    <div class="set-row"><span>Signed in<div class="muted" style="font-size:.75rem">${esc(CLOUD.user.email||"")}</div></span>
      <span class="pill">${ic("check")} ${ago===null?"connected":ago<60?"synced just now":"synced "+Math.round(ago/60)+" min ago"}</span></div>
    <div class="set-row"><span>Sync API keys too<div class="muted" style="font-size:.75rem">Convenient, but stores your key in the cloud</div></span>
      ${seg([[true,"On"],[false,"Off"]],"syncKeys")}</div>
    <div class="row" style="margin-top:12px">
      <button class="btn small" ${CLOUD.busy?"disabled":""} onclick="cloudSync()">${CLOUD.busy?"Syncing…":"Sync now"}</button>
      <button class="btn small secondary" onclick="cloudSignOut()">Sign out</button>
    </div>${note}</div>`;
}

/* ================= CURSOR-REACTIVE BACKGROUND ================= */
(function(){
  if(typeof window==="undefined"||typeof document==="undefined") return;
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const state={tx:.5,ty:.5,x:.5,y:.5,raf:null};
  window.addEventListener("pointermove",e=>{
    state.tx=e.clientX/window.innerWidth;
    state.ty=e.clientY/window.innerHeight;
    if(!state.raf) loop();
  },{passive:true});
  function loop(){
    // ease toward the pointer so motion feels like liquid, not a cursor attachment
    state.x+=(state.tx-state.x)*.06;
    state.y+=(state.ty-state.y)*.06;
    const w=window.innerWidth,h=window.innerHeight;
    const g=document.getElementById("cglow");
    if(g) g.style.transform=`translate3d(${state.x*w}px,${state.y*h}px,0)`;
    // blobs drift against the pointer at different depths (parallax)
    const dx=(state.x-.5),dy=(state.y-.5);
    const depths=[[-34,-24],[26,18],[-18,26]];
    document.querySelectorAll(".blob").forEach((b,i)=>{
      const d=depths[i]||[0,0];
      b.style.setProperty("--px",(dx*d[0]).toFixed(2)+"px");
      b.style.setProperty("--py",(dy*d[1]).toFixed(2)+"px");
      b.style.translate=`${(dx*d[0]).toFixed(2)}px ${(dy*d[1]).toFixed(2)}px`;
    });
    const near=Math.abs(state.tx-state.x)+Math.abs(state.ty-state.y);
    if(near>.0008){ state.raf=requestAnimationFrame(loop); } else { state.raf=null; }
  }
})();

/* ================= MISC ================= */
function confirmReset(){
  if(!confirm("Reset all progress?\n\nThis clears your stats, missed questions, streak and AI-generated questions.\nYour API key, theme and preferences are kept.")) return;
  // merge over the existing state so settings survive and no required field goes missing
  Object.assign(S,{
    focus:DOMAINS.map(d=>d.id), qstats:{}, sessions:0, aiQ:[],
    daily:{date:"",count:0,hit:false}, streak:{count:0,last:""}
  });
  for(let i=QUESTIONS.length-1;i>=0;i--) if(QUESTIONS[i].ai) QUESTIONS.splice(i,1);
  save(); quiz=null; lab=null; go("dash");
}
render();
if(typeof cloudInit==="function") cloudInit();
</script>
